<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALZZxBACK Gallery</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:'Cinzel', serif;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 40%),
      linear-gradient(to bottom, #000, #0a0a0a);
      z-index:-1;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
      padding:60px 0;
      text-align:center;
    }

    .title{
      font-size:4rem;
      letter-spacing:6px;
      margin-bottom:15px;
      text-shadow:0 0 20px rgba(255,255,255,0.25);
    }

    .subtitle{
      color:#888;
      margin-bottom:60px;
      font-size:1rem;
      letter-spacing:3px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:20px;
      background:#111;
      border:1px solid rgba(255,255,255,0.08);
      transition:0.4s ease;
      box-shadow:0 0 25px rgba(0,0,0,0.8);
    }

    .card:hover{
      transform:translateY(-10px) scale(1.02);
      box-shadow:0 0 30px rgba(255,255,255,0.12);
    }

    .card img{
      width:100%;
      height:450px;
      object-fit:cover;
      filter:grayscale(20%) brightness(0.8);
      transition:0.5s;
    }

    .card:hover img{
      transform:scale(1.05);
      filter:grayscale(0%) brightness(1);
    }

    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      display:flex;
      align-items:flex-end;
      padding:25px;
    }

    .overlay h2{
      font-size:1.4rem;
      letter-spacing:3px;
    }

    footer{
      margin-top:70px;
      color:#666;
      font-size:0.8rem;
      letter-spacing:2px;
    }

    @media(max-width:768px){
      .title{
        font-size:2.5rem;
      }

      .card img{
        height:350px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">ALZZxBACK</h1>
    <p class="subtitle">DARK GOTHIC GALLERY</p>

    <div class="gallery">

      <div class="card">
        <img src="foto1.jpg" alt="Foto 1">
        <div class="overlay">
          <h2>DARK SOUL</h2>
        </div>
      </div>

      <div class="card">
        <img src="foto2.jpg" alt="Foto 2">
        <div class="overlay">
          <h2>SHADOW VIBE</h2>
        </div>
      </div>

      <div class="card">
        <img src="foto3.jpg" alt="Foto 3">
        <div class="overlay">
          <h2>NIGHTMARE</h2>
        </div>
      </div>

    </div>

    <footer>
      © ALZZxBACK — DARK VIBES ONLY
    </footer>
  </div>

</body>
</html>
